name: Sameva CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Créer le fichier .env pour CI
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL}" > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "VALIDATION_AI_URL=" >> .env

      - name: Dépendances
        run: flutter pub get

      - name: Analyse statique
        run: flutter analyze --no-fatal-warnings

      - name: Tests avec couverture
        run: flutter test --coverage

      - name: Taux de couverture
        if: always()
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "Pas de fichier de couverture genere"
            exit 0
          fi
          # lcov : une ligne "DA:<ligne>,<nb_executions>".
          # Une ligne est couverte si le nombre d'executions est different de 0.
          total=$(grep -c "^DA:" coverage/lcov.info)
          couvertes=$(grep "^DA:" coverage/lcov.info | grep -vc ",0$")
          fichiers=$(grep -c "^SF:" coverage/lcov.info)
          taux=$(awk "BEGIN { printf \"%.1f\", ($couvertes/$total)*100 }")
          echo "Fichiers instrumentes : $fichiers"
          echo "Lignes couvertes      : $couvertes / $total"
          echo "Taux de couverture    : $taux %"
          {
            echo "### Couverture des tests"
            echo ""
            echo "| Indicateur | Valeur |"
            echo "| --- | --- |"
            echo "| Fichiers instrumentes | $fichiers |"
            echo "| Lignes couvertes | $couvertes / $total |"
            echo "| Taux de couverture | **$taux %** |"
          } >> "$GITHUB_STEP_SUMMARY"
