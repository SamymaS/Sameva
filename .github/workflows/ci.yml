name: Sameva CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Créer le fichier .env pour CI
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL}" > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "VALIDATION_AI_URL=" >> .env

      - name: Dépendances
        run: flutter pub get

      - name: Analyse statique
        run: flutter analyze --no-fatal-warnings

      - name: Tests avec couverture
        run: flutter test --coverage

      - name: Résumé couverture
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "📊 Lignes couvertes :"
            grep -c "^DA:" coverage/lcov.info || echo "0"
            echo "📊 Fichiers couverts :"
            grep -c "^SF:" coverage/lcov.info || echo "0"
          else
            echo "⚠️ Pas de fichier de couverture généré"
          fi
